# /etc/nginx/sites-available/auth.swapp1990.org
#
# Host nginx vhost that fronts the self-hosted Logto container.
#
# Port routing:
#   443   (user-facing: OIDC, sign-in experience, APIs) -> 127.0.0.1:3011
#   8443  (admin console + admin-tenant OIDC)           -> 127.0.0.1:3012
#
# Both listeners share the single auth.swapp1990.org cert. The admin
# console lives on a non-default port (not a subpath) so its SPA's
# hardcoded /api/* fetches resolve to the correct tenant — Logto OSS
# does not support serving the admin SPA from a subpath.
#
# For first-time deploy, run:
#     certbot --nginx -d auth.swapp1990.org
# then add the port-8443 server block below + open firewall:
#     ufw allow 8443/tcp

# ── user-facing (port 443) ────────────────────────────────────────────
server {
    server_name auth.swapp1990.org;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/auth.swapp1990.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.swapp1990.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ── admin (port 8443) ─────────────────────────────────────────────────
server {
    listen 8443 ssl;
    server_name auth.swapp1990.org;

    ssl_certificate /etc/letsencrypt/live/auth.swapp1990.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.swapp1990.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3012;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }
}

# ── HTTP -> HTTPS redirect ────────────────────────────────────────────
server {
    if ($host = auth.swapp1990.org) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name auth.swapp1990.org;
    return 404;
}
